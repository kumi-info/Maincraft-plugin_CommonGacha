# ========================== 汎用ガチャ設定 ==========================
# 使い方:  /gacha preset <id>   … presets.<id> を1回抽選
#          /gacha list          … プリセット一覧
#          /gacha reload        … この config.yml を再読み込み
#
# 抽選の流れ:
#   0) ガチャ名（presets.<id>.name）を数秒間タイトル表示（何のガチャか分かるように）
#   1) スロット風アニメ（animation.roll-seconds 秒、画面中央にランダム表示）
#   2) レア度ランク（例: SSR）を大きく表示
#   3) 当選した中身を表示して commands を実行
# ====================================================================

animation:
  roll-seconds: 3            # スロット回転の秒数（0 でアニメ無し・即ランク→中身表示）
  name-title-seconds: 2      # 抽選開始前にガチャ名を表示する秒数（0 で表示しない）
  chain-delay-seconds: 3     # 連鎖(chain)当選から次のガチャ開始までの秒数（当選表示を読む時間）
  name-title-color: gold     # ガチャ名タイトルの色。下記カラー名から指定。
  # 使えるカラー名: black, dark_blue, dark_green, dark_aqua, dark_red, dark_purple,
  #   gold, gray, dark_gray, blue, green, aqua, red, light_purple, yellow, white
  # ※ preset ごとに presets.<id>.name-color を入れるとそのガチャだけ色を上書きできます。

# 当選アナウンス（全体チャット）。使えるプレースホルダ:
#   %player% … 実行者名 / %name% … 当選名 / %rank% … ランク(SSR等) / %stars% … ⭐文字列
#   %presets%(=%preset%) … ガチャ名（presets.<id>.name。例: タイマーガチャ）
messages:
  win: "§6[%presets%] §e%name% §6を当選"

# -------------------------------------------------------------------
# レア度ランク（6段階）。各エントリの「当選確率(%)」から自動で決まります。
#   当選確率 = そのエントリの weight ÷ プリセット内 weight 合計 × 100
# 判定は max-chance（その確率%以下ならそのランク）。確率が低いほど高ランク。
#   stars … 表示する⭐の数（N=1。3個=SR からレア感が出る並びにしています）
#   color … タイトル色（GOLD, LIGHT_PURPLE, AQUA, GREEN, GRAY, RED, YELLOW, WHITE 等）
#           "RAINBOW" を指定すると虹色グラデ＋色が流れるアニメ表示（UR用）
# 例) 当選確率0.3% → UR(⭐6) / 0.8% → HR(⭐5) / 3% → SSR(⭐4) / 12% → SR(⭐3)
#     / 30% → R(⭐2) / 70% → N(⭐1)
# -------------------------------------------------------------------
rarity-tiers:
  - rank: "UR"
    max-chance: 0.5      # 0.5%以下（最高レア・虹色）
    stars: 6
    color: "RAINBOW"
  - rank: "HR"
    max-chance: 1.0      # 1%以下
    stars: 5
    color: "GOLD"
  - rank: "SSR"
    max-chance: 5.0      # 5%以下
    stars: 4
    color: "LIGHT_PURPLE"
  - rank: "SR"
    max-chance: 15.0     # 15%以下
    stars: 3
    color: "AQUA"
  - rank: "R"
    max-chance: 40.0     # 40%以下
    stars: 2
    color: "GREEN"
  - rank: "N"
    max-chance: 100.0    # それ以外（一番出やすい）
    stars: 1
    color: "GRAY"

# -------------------------------------------------------------------
# プリセットとエントリの書き方
#   presets:
#     '1':                 ← プリセットID。/gacha preset 1 の "1"。'文字'でも数字でも可
#       name: "表示名"      ← /gacha list 用の説明（任意）
#       entries:
#         apple:           ← ★エントリキー。任意の半角英数字でOK。"このプリセット内で
#                             重複しなければ何でも良い"。どこにも別途登録は不要。
#                             name を省略した場合は、このキーが表示名として使われます。
#           name: "りんご当たり"   ← 画面に出る当選名（省略時はキー名"apple"が使われる）
#           weight: 30.0          ← 相対確率。合計に対する比率で当選率が決まる
#           commands:             ← 当選時にコンソール権限で実行されるコマンド（複数可）
#             - "give %player% apple 5"   ← %player% は実行者名に置換される
#
#   ※ レア度(rank/⭐)は weight から自動算出されるので、エントリ側に rarity は不要です。
#
# ★連鎖ガチャ（倍々ガチャ等）:
#   エントリに chain: '<プリセットID>' を書くと、そのエントリの当選後に
#   指定プリセットを自動で連続抽選します（animation.chain-delay-seconds 秒後）。
#     - %player% は連鎖先にもそのまま引き継がれる
#     - 連鎖は最大20段で自動停止（chain がループしていても無限には回らない）
#   例) 下の baibai1〜baibai5 = 「WINの倍々ガチャ」
#       倍々が出るたび baibai1→2→3→4→5 と進み、-1 → -2 → -4 → -8 → -16WIN と倍増。
#       最終段(baibai5)には chain がないので -16WIN が上限。
# -------------------------------------------------------------------
presets:
  '1':
    name: "サンプルガチャ"
    entries:
      diamond:                     # ← 任意のキー（例: diamond）。一意ならOK
        name: "ダイヤ大当たり"
        weight: 3.0                # 合計138なので約2.2% → SSR想定
        commands:
          - "give %player% diamond 3"
          - "title %player% title {\"text\":\"大当たり!\",\"color\":\"gold\"}"
      iron:
        name: "鉄セット"
        weight: 15.0               # 約10.9% → SR想定
        commands:
          - "give %player% iron_ingot 8"
      apple:
        name: "りんご当たり"
        weight: 30.0               # 約21.7% → R想定
        commands:
          - "give %player% apple 5"
      nothing:
        name: "はずれ"
        weight: 90.0               # 約65.2% → N想定
        commands:
          - "title %player% actionbar {\"text\":\"はずれ...\",\"color\":\"gray\"}"

  # ---------------- WINの倍々ガチャ（連鎖デモ） ----------------
  # /gacha preset baibai1 で開始。「倍々」が出るたび次の段へ進み
  # マイナス幅が倍増（-1 → -2 → -4 → -8 → -16WIN）。-16WIN が上限。
  # WIN の増減は CommonWIN プラグインの /win sub を使用。
  # weight は各段共通: 当たり40 / はずれ40 / 倍々20（%表示は自動計算）
  baibai1:
    name: "WINの倍々ガチャ"
    name-color: red
    entries:
      lose:
        name: "－1WIN"
        weight: 40.0
        commands:
          - "win sub 1"
      miss:
        name: "はずれ"
        weight: 40.0
        commands:
          - "title %player% actionbar {\"text\":\"はずれ...\",\"color\":\"gray\"}"
      double:
        name: "倍々!!"
        weight: 20.0
        chain: 'baibai2'           # ← 当選後 baibai2 を自動抽選
  baibai2:
    name: "WINの倍々ガチャ ×2"
    name-color: red
    entries:
      lose:
        name: "－2WIN"
        weight: 40.0
        commands:
          - "win sub 2"
      miss:
        name: "はずれ"
        weight: 40.0
        commands:
          - "title %player% actionbar {\"text\":\"はずれ...\",\"color\":\"gray\"}"
      double:
        name: "倍々!!"
        weight: 20.0
        chain: 'baibai3'
  baibai3:
    name: "WINの倍々ガチャ ×4"
    name-color: red
    entries:
      lose:
        name: "－4WIN"
        weight: 40.0
        commands:
          - "win sub 4"
      miss:
        name: "はずれ"
        weight: 40.0
        commands:
          - "title %player% actionbar {\"text\":\"はずれ...\",\"color\":\"gray\"}"
      double:
        name: "倍々!!"
        weight: 20.0
        chain: 'baibai4'
  baibai4:
    name: "WINの倍々ガチャ ×8"
    name-color: red
    entries:
      lose:
        name: "－8WIN"
        weight: 40.0
        commands:
          - "win sub 8"
      miss:
        name: "はずれ"
        weight: 40.0
        commands:
          - "title %player% actionbar {\"text\":\"はずれ...\",\"color\":\"gray\"}"
      double:
        name: "倍々!!"
        weight: 20.0
        chain: 'baibai5'
  baibai5:                         # 最終段: chain なし＝-16WIN が上限
    name: "WINの倍々ガチャ ×16 (MAX)"
    name-color: dark_red
    entries:
      lose:
        name: "－16WIN"
        weight: 50.0
        commands:
          - "win sub 16"
      miss:
        name: "はずれ"
        weight: 50.0
        commands:
          - "title %player% actionbar {\"text\":\"はずれ...\",\"color\":\"gray\"}"
